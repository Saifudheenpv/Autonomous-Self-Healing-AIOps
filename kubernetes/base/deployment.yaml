apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-app
  labels:
    app: aiops-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: aiops-app

  template:
    metadata:
      labels:
        app: aiops-app

    spec:
      containers:
      - name: aiops-app

        image: autonomous-self-healing-aiops:v1.0.0

        imagePullPolicy: Never

        ports:
        - containerPort: 5000

        env:
        - name: APP_VERSION
          value: "1.0.0"

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "250m"
            memory: "256Mi"
